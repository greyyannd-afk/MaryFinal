<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Halo Beb :)</title>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;height:100%;
      overflow:hidden;
      background:#fff;
      color:#1a1a1a;
      font-family:'Karla',sans-serif;
      -webkit-font-smoothing:antialiased;
    }

    /* ── every section is absolute, full-screen ── */
    .sec{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:52px 36px;
      opacity:0;
      transition:opacity 0.8s ease;
      pointer-events:none;
    }
    .sec.on{
      opacity:1;
      pointer-events:all;
    }

    /* ── cursor ── */
    .cur{
      display:inline-block;
      width:2px;height:1em;
      background:#1a1a1a;
      margin-left:2px;
      vertical-align:middle;
      animation:blink .65s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ── blue highlight chip ── */
    .chip{
      display:inline-block;
      background:#2563eb;
      color:#fff;
      font-weight:700;
      border-radius:5px;
      padding:0 7px 2px;
      line-height:1.2;
    }

    /* ── S1 greeting ── */
    #s1 .big{
      font-size:clamp(2rem,9vw,3.2rem);
      font-weight:300;
      letter-spacing:.07em;
      line-height:1.3;
    }
    #s1 .small{
      margin-top:20px;
      font-size:.92rem;
      letter-spacing:.13em;
      font-style:italic;
      font-weight:300;
      opacity:0;
      transition:opacity .7s ease;
    }
    #s1 .small.show{opacity:.55}

    /* ── S2 date ── */
    #s2 .big{
      font-size:clamp(1rem,4.5vw,1.4rem);
      font-weight:300;
      letter-spacing:.1em;
    }
    #s2 .big b{font-weight:600}

    /* ── S3 chat ── */
    #s3{
      align-items:flex-start;
      padding-left:clamp(28px,12vw,90px);
    }
    .chat-wrap{
      display:flex;flex-direction:column;
      align-items:flex-start;gap:10px;
      max-width:310px;width:100%;
    }
    .chat-who{font-size:.68rem;letter-spacing:.14em;opacity:.3;padding-left:2px}
    .bubble{
      background:#f0f0f0;
      border-radius:18px 18px 18px 4px;
      padding:16px 20px;
      max-width:300px;
      text-align:left;
    }
    .bubble p{font-size:.93rem;line-height:1.72;color:#2a2a2a;min-height:1.4em}
    .send-row{
      display:flex;align-items:center;
      justify-content:flex-end;gap:10px;
      width:100%;
      opacity:0;transition:opacity .5s ease;
      pointer-events:none;
    }
    .send-row.show{opacity:1;pointer-events:all}
    .send-hint{font-size:.68rem;letter-spacing:.08em;opacity:.3;font-style:italic}
    .send-btn{
      font-family:'Karla',sans-serif;
      font-size:.8rem;letter-spacing:.1em;
      border:1.5px solid #1a1a1a;
      border-radius:999px;
      background:transparent;
      padding:7px 20px;
      cursor:pointer;
      transition:background .2s,color .2s,transform .12s,opacity .2s;
    }
    .send-btn:hover{background:#1a1a1a;color:#fff}
    .send-btn.pressed{background:#1a1a1a;color:#fff;transform:scale(.93);opacity:.7}

    /* ── S4 build-up ── */
    #s4 .lines{display:flex;flex-direction:column;gap:12px;align-items:center}
    #s4 .line{
      font-size:clamp(.95rem,3.2vw,1.12rem);
      font-weight:300;letter-spacing:.06em;
      min-height:1.5em;
      transition:opacity .5s ease;
    }
    #s4 .line strong{font-weight:700}
    #s4 .line.dim{opacity:.18}
    #s4 .so{
      font-size:clamp(2rem,8vw,3rem)!important;
      font-weight:700!important;
      letter-spacing:.3em!important;
      margin-top:8px;
    }

    /* ── S5 wish ── */
    #s5 .wish-title{
      font-size:clamp(1.5rem,5.5vw,2rem);
      font-weight:600;letter-spacing:.04em;
      min-height:1.3em;
    }
    #s5 .wish-body{
      margin-top:18px;
      font-size:.93rem;line-height:1.85;
      max-width:310px;
      font-weight:300;font-style:italic;
      opacity:.65;min-height:3em;
    }

    /* ── S6 dots ── */
    #s6{flex-direction:row!important;flex-wrap:wrap;gap:18px;max-width:220px;justify-content:center}
    #s6 svg{width:13px;height:13px;fill:#c8c8c8;opacity:0;transform:scale(.3);transition:opacity .35s ease,transform .35s ease}
    #s6 svg.pop{opacity:1;transform:scale(1)}

    /* ── S7 proposal ── */
    #s7 .prop-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}
    #s7 .stamp{font-size:.7rem;letter-spacing:.12em;opacity:.35;font-variant-numeric:tabular-nums;min-height:1em}
    #s7 .q{
      font-size:clamp(1.05rem,3.8vw,1.3rem);
      font-weight:300;line-height:1.95;
      max-width:290px;letter-spacing:.04em;min-height:4em;
    }
    #s7 .q strong{font-weight:600}
    .prop-btns{display:flex;gap:14px;opacity:0;transition:opacity .6s ease;pointer-events:none}
    .prop-btns.show{opacity:1;pointer-events:all}
    .btn-y,.btn-n{
      padding:12px 32px;border-radius:999px;
      font-family:'Karla',sans-serif;font-size:.87rem;letter-spacing:.08em;
      cursor:pointer;border:1.5px solid #1a1a1a;background:transparent;
      transition:background .25s,color .25s,transform .12s;
    }
    .btn-y:active,.btn-n:active{transform:scale(.95)}
    .btn-y:hover{background:#1a1a1a;color:#fff}
    .btn-n{border-color:#d0d0d0;color:#aaa}
    .btn-n:hover{opacity:.55}

    .smile{font-size:2rem!important}

    /* ── doubt popup ── */
    #doubt{
      display:none;position:fixed;inset:0;
      background:rgba(255,255,255,.97);
      z-index:800;
      flex-direction:column;align-items:center;justify-content:center;
      gap:32px;padding:40px 28px;text-align:center;
    }
    #doubt.on{display:flex}
    #doubt-msg{
      font-size:clamp(1.3rem,5.5vw,2rem);
      font-weight:300;letter-spacing:.06em;
      transition:opacity .18s;
    }

    /* ── happy overlay ── */
    #happy{
      display:none;position:fixed;inset:0;background:#fff;z-index:900;
      flex-direction:column;align-items:center;justify-content:center;
      text-align:center;gap:22px;padding:52px 36px;
    }
    #happy.on{display:flex}
    #happy>*{opacity:0;transform:translateY(20px);animation:none}
    #happy.on>*{animation:riseIn .8s cubic-bezier(.22,1,.36,1) both}
    #happy.on>*:nth-child(1){animation-delay:.00s}
    #happy.on>*:nth-child(2){animation-delay:.20s}
    #happy.on>*:nth-child(3){animation-delay:.38s}
    #happy.on>*:nth-child(4){animation-delay:.54s}
    #happy.on>*:nth-child(5){animation-delay:.66s}
    #happy.on>*:nth-child(6){animation-delay:.80s}
    @keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .h-emoji{font-size:2.6rem;line-height:1}
    .h-title{font-size:clamp(1.6rem,6vw,2.2rem);font-weight:700;letter-spacing:.05em}
    .h-body{font-size:.95rem;line-height:1.85;max-width:300px;font-weight:300;font-style:italic;opacity:.7}
    .h-sign{font-size:.78rem;letter-spacing:.1em;opacity:.35;margin-top:6px}
    #happy #replay{
      margin-top:4px;
      font-family:'Karla',sans-serif;
      font-size:.82rem;letter-spacing:.12em;
      border:1.5px solid #1a1a1a;
      border-radius:999px;
      background:transparent;
      padding:10px 26px;
      cursor:pointer;
      transition:background .25s,color .25s,transform .12s;
    }
    #happy #replay:hover{background:#1a1a1a;color:#fff}
    #happy #replay:active{transform:scale(.95)}
  </style>
</head>
<body>

<!-- S1 greeting -->
<div class="sec" id="s1">
  <p class="big" id="s1t"></p>
  <p class="small" id="s1s">I really like your name btw!</p>
</div>

<!-- S2 date -->
<div class="sec" id="s2">
  <p class="big" id="s2t"></p>
</div>

<!-- S3 chat -->
<div class="sec" id="s3">
  <div class="chat-wrap">

    <div class="send-row" id="sendRow">

<div class="sec" id="s4">

    <p class="line" id="l3"></p>
    <p class="line" id="l4"></p>
    <p class="line" id="l5"></p>
    <p class="line so" id="l6"></p>
  </div>
</div>

<!-- S5 wish -->
<div class="sec" id="s5">

<!-- S6 dots -->
<div class="sec" id="s6">
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
  <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="20"/></svg>
</div>

<!-- S7 proposal -->
<div class="sec" id="s7">
  <div class="prop-wrap">
    <p class="stamp" id="stamp"></p>
    <p class="q" id="s7q"></p>
    <div class="prop-btns" id="propBtns">
      <button class="btn-y" onclick="sayYes()">YEAYY &#127881;</button>
      <button class="btn-n" onclick="sayNo()">no...</button>
    </div>
  </div>
</div>

<!-- doubt popup -->
<div id="doubt">
  <p id="doubt-msg">u sure?</p>
  <div class="prop-btns" style="opacity:1;pointer-events:all">
    <button class="btn-y" onclick="sayYes()">okay fine, YEAYY</button>
    <button class="btn-n" onclick="nextDoubt()">still no</button>
  </div>
</div>

<!-- happy overlay -->
<div id="happy">
  <p class="h-emoji">&#128149;&#127881;</p>
  <p class="h-title">YES, I'M SO HAPPY!!</p>
  <p class="h-body">Beneran?? Gua ga bisa stop senyum sekarang.<br/>You just made everything so much better.</p>
  <p class="h-body">No more FWA thingy —<br/>just us, for real this time. :)</p>
  <p class="h-sign">— yours, always &#129334;</p>
  <button id="replay">&#8634;&nbsp;&nbsp;Watch it again</button>
</div>

<script>
/* ════════════════════════════════════════
   LIVE DATE
════════════════════════════════════════ */
var MON = ["Januari","Februari","Maret","April","Mei","Juni",
           "Juli","Agustus","September","Oktober","November","Desember"];
var DAY = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

function nowStr() {
  var n  = new Date();
  var hh = ("0"+n.getHours()).slice(-2);
  var mm = ("0"+n.getMinutes()).slice(-2);
  var ss = ("0"+n.getSeconds()).slice(-2);
  return DAY[n.getDay()]+", "+n.getDate()+" "+MON[n.getMonth()]+" "+n.getFullYear()
         +"  \u00b7  "+hh+":"+mm+":"+ss;
}

var dateActive = false;
setInterval(function(){
  if (dateActive) {
    var e1 = document.getElementById("s2t");
    var e2 = document.getElementById("stamp");
    if (e1 && e1._live) e1.innerHTML = "Sekarang&nbsp;<b>"+nowStr()+"</b>";
    if (e2) e2.textContent = nowStr();
  }
}, 1000);


/* ════════════════════════════════════════
   SECTION HELPERS
════════════════════════════════════════ */
function showSec(id) {
  var el = document.getElementById(id);
  el.style.display = "";   // make sure it's not display:none
  // force reflow then add class
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      el.classList.add("on");
    });
  });
}

function hideSec(id, cb) {
  var el = document.getElementById(id);
  el.classList.remove("on");
  setTimeout(function() {
    if (cb) cb();
  }, 850);
}


/* ════════════════════════════════════════
   TYPEWRITER
   type(el, text, speed, done)
   Supports:
     Plain text strings
     Segment arrays: [{t:"text"},{b:"bold"},{h:"chip-text"},{br:true}]
════════════════════════════════════════ */
function addCursor(el) {
  var c = document.createElement("span");
  c.className = "cur";
  el.appendChild(c);
  return c;
}
function removeCursor(c) {
  if (c && c.parentNode) c.parentNode.removeChild(c);
}

function typeSegments(el, segs, speed, done) {
  var si = 0;   // segment index
  var ci = 0;   // char index within segment
  var cur = addCursor(el);
  var activeNode = null;  // current text/span node being written into

  function nextChar() {
    /* advance to next segment if needed */
    if (si >= segs.length) {
      // all done
      setTimeout(function() {
        removeCursor(cur);
        if (done) done();
      }, 200);
      return;
    }

    var seg = segs[si];

    /* handle <br> segment instantly */
    if (seg.br) {
      cur.insertAdjacentHTML("beforebegin","<br/>");
      si++; ci = 0; activeNode = null;
      setTimeout(nextChar, speed);
      return;
    }

    var str = seg.t || seg.b || seg.h || "";

    if (ci === 0) {
      /* create the right container node at start of segment */
      if (seg.b) {
        activeNode = document.createElement("strong");
        el.insertBefore(activeNode, cur);
      } else if (seg.h) {
        activeNode = document.createElement("span");
        activeNode.className = "chip";
        el.insertBefore(activeNode, cur);
      } else {
        activeNode = null; // plain — insert directly before cursor
      }
    }

    if (ci < str.length) {
      var ch = str[ci];
      if (activeNode) {
        activeNode.appendChild(document.createTextNode(ch));
      } else {
        cur.insertAdjacentText("beforebegin", ch);
      }
      ci++;
      setTimeout(nextChar, speed + (Math.random()*18 - 9));
    } else {
      /* segment done */
      si++; ci = 0; activeNode = null;
      setTimeout(nextChar, speed);
    }
  }

  nextChar();
}

/* convenience: type a plain string */
function typeStr(el, str, speed, done) {
  typeSegments(el, [{t: str}], speed, done);
}


/* ════════════════════════════════════════
   FLOW
════════════════════════════════════════ */
var sendDone = null;   // callback waiting for send tap
var sendTimer = null;

function startShow() {
  /* reset everything */
  dateActive = false;
  var secs = document.querySelectorAll(".sec");
  for (var i = 0; i < secs.length; i++) {
    secs[i].classList.remove("on");
  }
  var ids = ["s1t","s1s","s2t","s3t","l1","l2","l3","l4","l5","l6","s5t","s5b","s7q","stamp"];
  for (var j = 0; j < ids.length; j++) {
    var e = document.getElementById(ids[j]);
    if (e) { e.innerHTML = ""; e._live = false; }
  }
  document.getElementById("s1s").classList.remove("show");
  document.getElementById("sendRow").classList.remove("show");
  document.getElementById("sendBtn").classList.remove("pressed");
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("propBtns").classList.remove("show");
  document.querySelectorAll("#s4 .line").forEach(function(l){ l.classList.remove("dim"); });
  document.querySelectorAll("#s6 svg").forEach(function(d){ d.classList.remove("pop"); });


  if (sendTimer) { clearTimeout(sendTimer); sendTimer = null; }
  sendDone = null;

  /* kick off */
  setTimeout(step1, 400);
}

/* S1: Hey, Maryeth */
function step1() {
  showSec("s1");
  setTimeout(function() {
    typeSegments(
      document.getElementById("s1t"),
      [{t:"Hey,\u00a0"}, {h:"Maryeth"}],
      58,
      function() {
        setTimeout(function() {
          document.getElementById("s1s").classList.add("show");
          setTimeout(function() {
            hideSec("s1", step2);
          }, 2400);
        }, 500);
      }
    );
  }, 600);
}

/* S2: date — show instantly, no typing */
function step2() {
  var el = document.getElementById("s2t");
  el._live = true;
  dateActive = true;
  el.innerHTML = "Sekarang&nbsp;<b>"+nowStr()+"</b>";
  showSec("s2");
  setTimeout(function() {
    hideSec("s2", step3);
  }, 2800);
}

/* S3: chat bubble */
function step3() {
  showSec("s3");
  setTimeout(function() {
    typeStr(
      document.getElementById("s3t"),
      "Gua merasa cocok sama lu, gua pengen kita mulai blah blah and blah blah...",
      48,
      function() {
        setTimeout(function() {
          document.getElementById("sendRow").classList.add("show");
          /* wait for tap, or auto after 7s */
          sendDone = afterSend;
          sendTimer = setTimeout(function() {
            triggerSend();
          }, 7000);
        }, 400);
      }
    );
  }, 700);
}

function doSend() {
  if (sendTimer) { clearTimeout(sendTimer); sendTimer = null; }
  triggerSend();
}

function triggerSend() {
  var btn = document.getElementById("sendBtn");
  btn.disabled = true;
  btn.classList.add("pressed");
  setTimeout(function() {
    hideSec("s3", function() {
      if (sendDone) { var cb = sendDone; sendDone = null; cb(); }
    });
  }, 500);
}

function afterSend() {
  step4();
}

/* S4: build-up */
function step4() {
  showSec("s4");

  var queue = [
    { el:"l1", segs:[{t:"That's what I was going to do."}]            },
    { el:"l2", segs:[{t:"But then I stopped."}]                       },
    { el:"l3", segs:[{t:"I realised, I wanted to do something\u00a0"},{h:"special"},{t:"."}] },
    { el:"l4", segs:[{t:"Because,"}]                                  },
    { el:"l5", segs:[{t:"You are Special\u00a0\u00a0:)"}]             },
    { el:"l6", segs:[{h:"SO"}], so:true                               }
  ];

  var qi = 0;
  function nextLine() {
    if (qi >= queue.length) {
      /* dim first 4, linger, fade out */
      setTimeout(function() {
        ["l1","l2","l3","l4"].forEach(function(id){
          document.getElementById(id).classList.add("dim");
        });
        setTimeout(function() {
          hideSec("s4", step5);
        }, 1600);
      }, 900);
      return;
    }
    var cfg = queue[qi]; qi++;
    var el = document.getElementById(cfg.el);
    typeSegments(el, cfg.segs, 56, function() {
      setTimeout(nextLine, 420);
    });
  }
  setTimeout(nextLine, 400);
}

/* S5: wish */
function step5() {
  showSec("s5");
  setTimeout(function() {
    typeStr(document.getElementById("s5t"), "I love you, Maryeth!", 55, function() {
      setTimeout(function() {
        typeSegments(
          document.getElementById("s5b"),
          [{t:"Gua udah mikirin ini lama banget,"},{br:true},{t:"dan akhirnya gua berani buat bilang..."}],
          62,
          function() {
            setTimeout(function() {
              hideSec("s5", stepDots);
            }, 2400);
          }
        );
      }, 600);
    });
  }, 500);
}

/* dots */
function stepDots() {
  showSec("s6");
  var dots = document.querySelectorAll("#s6 svg");
  var di = 0;
  function popNext() {
    if (di < dots.length) {
      dots[di].classList.add("pop");
      di++;
      setTimeout(popNext, 90);
    } else {
      /* all in — pause — shrink out */
      setTimeout(function() {
        dots.forEach(function(d){
          d.style.opacity = "0";
          d.style.transform = "scale(0.2)";
        });
        setTimeout(function() {
          hideSec("s6", step7);
        }, 400);
      }, 700);
    }
  }
  setTimeout(popNext, 300);
}

/* S7: proposal */
function step7() {
  showSec("s7");
  document.getElementById("stamp").textContent = nowStr();
  setTimeout(function() {
    typeSegments(
      document.getElementById("s7q"),
      [
        {t:"So at\u00a0"},{b:"this date"},{t:","},
        {br:true},{t:"would you like to"},
        {br:true},{t:"make me yours?"}
      ],
      68,
      function() {
        setTimeout(function() {
          document.getElementById("propBtns").classList.add("show");
        }, 600);
      }
    );
  }, 600);
}


/* ════════════════════════════════════════
   PROPOSAL BUTTONS
════════════════════════════════════════ */
var DOUBTS = [
  "u sure?",
  "ade we deadass?",
  "really bro?",
  "come on... \uD83D\uDE4F",
  "u sure sure?",
  "bro PLEASE \uD83D\uDE2D",
  "okay but really??",
  "last chance to say yes lol",
  "i will wait forever btw",
  "...still no?"
];
var di = 0;

function sayNo() {
  di = 0;
  document.getElementById("doubt-msg").textContent = DOUBTS[0];
  document.getElementById("doubt").classList.add("on");
}
function nextDoubt() {
  di = (di+1) % DOUBTS.length;
  var m = document.getElementById("doubt-msg");
  m.style.opacity = "0";
  setTimeout(function(){
    m.textContent = DOUBTS[di];
    m.style.opacity = "1";
  }, 180);
}
function sayYes() {
  document.getElementById("doubt").classList.remove("on");
  document.getElementById("happy").classList.add("on");
}


/* ════════════════════════════════════════
   REPLAY
════════════════════════════════════════ */
document.getElementById("replay").addEventListener("click", function() {
  document.getElementById("happy").classList.remove("on");
  document.getElementById("doubt").classList.remove("on");
  startShow();
});


/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
window.addEventListener("load", function() {
  startShow();
});
</script>
